<script>

const db=firebase.database();

let symbols=[];

let widget=null;
let selectedSymbol=null;
let currentTheme="light";
let contextSymbol=null;

let settings={sound:true};

document.getElementById("resetBtn").onclick=()=>{

async function fetchSymbols(){

const res=await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo");
const data=await res.json();

symbols=data.symbols
.filter(s=>s.contractType==="PERPETUAL" && s.quoteAsset==="USDT")
.map(s=>s.symbol);

}

function isHammer(c){

let open=parseFloat(c[1]);
let high=parseFloat(c[2]);
let low=parseFloat(c[3]);
let close=parseFloat(c[4]);

let body=Math.abs(close-open);
let lower=Math.min(open,close)-low;
let upper=high-Math.max(open,close);

return(
lower>=upper*2 &&
upper*2<=lower &&
body*2<=lower
);

}

function saveToFirebase(){

Object.keys(hammerSymbols).forEach(symbol=>{

let data=hammerSymbols[symbol];

db.ref("hammerSignals/"+symbol).set({
symbol:symbol,
qty:data.qty,
size:data.size
});

});

}

async function getHammer(symbol){

try{

const res=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=120`);
const data=await res.json();

if(!Array.isArray(data)) return null;

let prev=data.slice(0,96);

let dayLow=Math.min(...prev.map(x=>parseFloat(x[3])));
let dayHigh=Math.max(...prev.map(x=>parseFloat(x[2])));

let last3=data.slice(-3);

for(let i=0;i<last3.length;i++){

let c=last3[i];

if(!isHammer(c)) continue;

let index=data.length-3+i;

let prev20=data.slice(index-20,index);
let prev20Low=Math.min(...prev20.map(x=>parseFloat(x[3])));

let high=parseFloat(c[2]);
let low=parseFloat(c[3]);

if(low>=prev20Low) continue;

let lowRule=(low<=dayLow && high>=dayLow);
let highRule=(low<=dayHigh && high>=dayHigh);

if(lowRule || highRule){

let entry=high;
let stop=low;
let risk=0.10;

let diff=entry-stop;
if(diff<=0) return null;

let qty=risk/diff;
let size=qty*entry;

return{qty,size};

}

}

return null;

}catch{
return null;
}

}

function loadFromFirebase(){

db.ref("hammerSignals").on("value",(snapshot)=>{

hammerSymbols={};

snapshot.forEach(child=>{

let d=child.val();

hammerSymbols[d.symbol]={
qty:d.qty,
size:d.size
};

});

render();

});

}

async function scan(){

document.getElementById("updateText").innerText="Scanning...";

const promises=symbols.map(s=>getHammer(s));
const results=await Promise.all(promises);

let newList={};

symbols.forEach((s,i)=>{
if(results[i]) newList[s]=results[i];
});

hammerSymbols={...hammerSymbols,...newList};

render();
saveToFirebase();

document.getElementById("updateText").innerText="Updated: "+new Date().toLocaleTimeString();

}

function render(){

const tbody=document.getElementById("body");

Object.keys(hammerSymbols).forEach(s=>createRow(s));

function createRow(s){

if(selectedSymbol===s)
row.classList.add("selected");

let data=hammerSymbols[s];

row.innerHTML=`

<td>${data.qty.toFixed(2)}</td>
<td>${data.size.toFixed(2)}</td>
`;

row.onclick=()=>{
selectedSymbol=s;
changeChartSymbol(s);
render();
};

row.oncontextmenu=(e)=>{
e.preventDefault();
contextSymbol=s;

const menu=document.getElementById("contextMenu");

menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";
};

document.getElementById("body").appendChild(row);

}

document.getElementById("openTVOption").onclick=()=>{

if(contextSymbol){

const url="https://in.tradingview.com/chart/?symbol=BINANCE:"+contextSymbol+".P";
window.open(url,"_blank");

}

hideMenu();

};

document.getElementById("copyOption").onclick=()=>{

if(contextSymbol)
navigator.clipboard.writeText(contextSymbol);

hideMenu();

};

document.getElementById("deleteOption").onclick=()=>{

if(contextSymbol){

if(confirm("Delete "+contextSymbol+" ?")){

delete hammerSymbols[contextSymbol];
db.ref("hammerSignals/"+contextSymbol).remove();
render();

}

}

hideMenu();

};

function hideMenu(){
document.getElementById("contextMenu").style.display="none";
}

document.addEventListener("click",hideMenu);

document.getElementById("settingsBtn").onclick=(e)=>{

const pop=document.getElementById("settingsPopup");

pop.style.display="block";
pop.style.left=e.pageX+"px";
pop.style.top=e.pageY+"px";

};

};

});

function initChart(){

widget=new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:BTCUSDT.P",
interval:"15",
autosize:true,
theme:currentTheme,
studies:[

"Pivot Points Standard@tv-basicstudies"
],
studies_overrides:{

}
});

}

function changeChartSymbol(symbol){

document.getElementById("chart").innerHTML="";

widget=new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:"+symbol+".P",
interval:"15",
autosize:true,
theme:currentTheme,
studies:[
"Volume@tv-basicstudies",
"Pivot Points Standard@tv-basicstudies"
],
studies_overrides:{
"volume.volume.transparency":0
}
});

}

function toggleTheme(){

currentTheme=currentTheme==="light"?"dark":"light";

if(selectedSymbol)
changeChartSymbol(selectedSymbol);
else
changeChartSymbol("BTCUSDT");

}

async function init(){

loadFromFirebase();

document.getElementById("soundToggle").checked=settings.sound;

render();

await fetchSymbols();

initChart();

scan();

setInterval(scan,900000);

}

init();

</script>
